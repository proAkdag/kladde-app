<style>
@layer reset, base, components, views;

@layer reset {
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; line-height: 1.45; }
  :root {
    color-scheme: dark;
    --grund: #14161c; --karte: #1d2027; --karte2: #24272f; --kante: #2c303a;
    --text: #e8e4da; --leise: #9a958a; --band: #c49a5a;
    --gut: #7fb069; --warn: #d9a441; --fehl: #c96f6f; --info: #6f9dc9;
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  button { font: inherit; color: inherit; }
}

@layer base {
  html { overscroll-behavior: none; height: 100%; }
  body {
    background: var(--grund); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  input, textarea { user-select: text; -webkit-user-select: text; font: inherit; }
  main { flex: 1; overflow-y: auto; padding: 10px 12px calc(env(safe-area-inset-bottom) + 74px); }
  .hidden { display: none !important; }
}

@layer components {
  header.app {
    display: flex; align-items: center; gap: 8px;
    padding: calc(env(safe-area-inset-top) + 8px) 12px 8px;
    border-bottom: 1px solid var(--kante);
  }
  .band { width: 6px; height: 22px; background: var(--band); border-radius: 2px; }
  #kurs-chip {
    background: var(--karte); border: 1px solid var(--kante); border-radius: 8px;
    padding: 8px 12px; min-height: 44px; display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-weight: 600; max-width: 60vw; overflow: hidden; white-space: nowrap;
  }
  #kurs-chip small { color: var(--leise); font-weight: 400; }
  .spacer { flex: 1; }
  .icon-btn {
    background: transparent; border: 1px solid var(--kante); border-radius: 8px;
    min-width: 44px; min-height: 44px; cursor: pointer; font-size: 17px;
  }
  .icon-btn.aktiv { border-color: var(--band); color: var(--band); }
  nav.tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: var(--karte); border-top: 1px solid var(--kante);
    padding-bottom: env(safe-area-inset-bottom); z-index: 30;
  }
  nav.tabs button {
    flex: 1; background: none; border: none; padding: 10px 4px 8px; min-height: 52px;
    color: var(--leise); font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  nav.tabs button .t-ico { font-size: 19px; }
  nav.tabs button.aktiv { color: var(--band); }
  .panel { background: var(--karte); border: 1px solid var(--kante); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
  .panel h2 { font-size: 13px; margin: 0 0 8px; color: var(--leise); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
  .zeile { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; border-top: 1px solid var(--kante); font-size: 15px; align-items: center; }
  .zeile:first-of-type { border-top: none; }
  .zeile .wert { color: var(--leise); text-align: right; font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
  .btn {
    background: transparent; color: var(--band); border: 1px solid var(--band); border-radius: 8px;
    padding: 10px 14px; min-height: 44px; min-width: 44px; cursor: pointer; font-size: 15px;
  }
  .btn:active { background: rgba(196,154,90,.15); }
  .btn.still { color: var(--leise); border-color: var(--kante); }
  .btn.gefahr { color: var(--fehl); border-color: var(--fehl); }
  .btn-reihe { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; background: var(--leise); flex-shrink: 0; }
  .dot.gut { background: var(--gut); } .dot.warn { background: var(--warn); } .dot.fehl { background: var(--fehl); }
  select, input[type=text], input[type=password], input[type=date], input[type=time], input[type=number] {
    background: var(--karte2); color: var(--text); border: 1px solid var(--kante); border-radius: 8px;
    padding: 10px; min-height: 44px; font-size: 16px; /* ≥16px gegen iOS-Zoom */
  }
  dialog {
    background: var(--karte); color: var(--text); border: 1px solid var(--kante); border-radius: 12px;
    padding: 16px; max-width: min(480px, 92vw); margin: auto;
  }
  dialog::backdrop { background: rgba(0,0,0,.55); }
  #toast {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(env(safe-area-inset-bottom) + 84px);
    background: var(--karte2); border: 1px solid var(--kante); border-radius: 10px; padding: 10px 16px;
    z-index: 60; max-width: 88vw; font-size: 14px; box-shadow: 0 8px 22px rgba(0,0,0,.4);
  }
  #undo-chip {
    position: fixed; right: 12px; bottom: calc(env(safe-area-inset-bottom) + 84px); z-index: 40;
    background: var(--karte2); border: 1px solid var(--band); color: var(--band);
    border-radius: 20px; padding: 10px 16px; min-height: 44px; cursor: pointer; font-size: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,.35);

@layer views {
  /* ── Datums-Streifen (Heute-Ansicht) ── */

  .datum-streifen .rechts { margin-left: auto; display: flex; gap: 6px; }

  .legende { display: flex; flex-direction: column; gap: 9px; font-size: 14px; margin: 4px 0 10px; }

  /* ── Sitzplan: Name + Tages-Stand als Symbole/Farben · Beamer-Toggle versteckt Werte ── */
  #plan-wrap { overflow: auto; }
  #plan {
    display: grid; grid-template-columns: repeat(12, minmax(46px, 66px)); gap: 4px;
    min-width: 600px; justify-content: center;
  }
  #plan .kachel {
    aspect-ratio: 1; border-radius: 7px; border: 1px solid transparent;
    display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start;

  #plan .kachel.leer { background: transparent; }
  #plan .kachel.schueler { background: var(--karte); border-color: var(--kante); cursor: pointer; }
  #plan .kachel.schueler.gewaehlt { outline: 2px solid var(--band); outline-offset: -2px; }
  #plan .kachel.netto-plus  { background: #1c2a1a; }   /* mehrheitlich + */
  #plan .kachel.netto-minus { background: #2c1a1a; }   /* mehrheitlich − */
  #plan .kachel.netto-fehlt { background: #202226; opacity: .55; }
  #plan .kachel .kopf { display: flex; align-items: center; gap: 3px; padding: 3px 4px 0; }
  #plan .kachel .vn { font-weight: 600; flex: 1; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  #plan .kachel .lb-badge { background: var(--info); color: #06121e; font-size: 8px; font-weight: 800; border-radius: 3px; padding: 0 3px; letter-spacing: .03em; }
  #plan .kachel .nn { color: var(--leise); font-size: 9px; padding: 0 4px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  #plan .kachel .marken { margin-top: auto; display: flex; flex-wrap: wrap; gap: 2px; padding: 2px 3px 3px; min-height: 15px; }
  #plan .kachel .mk { border-radius: 3px; padding: 0 3px; font-size: 10px; font-weight: 700; line-height: 1.3; }
  #plan .kachel .mk.p { background: var(--gut); color: #08160a; }
  #plan .kachel .mk.m { background: var(--fehl); color: #1c0606; }
  #plan .kachel .mk.o { background: var(--kante); color: var(--text); }
  #plan .kachel .mk.u { background: var(--fehl); color: #fff; }
  #plan .kachel .mk.sym { background: transparent; padding: 0 1px; }
  body.beamer #plan .kachel .marken { display: none; }
  body.beamer #plan .kachel .lb-badge { display: none; }  /* LB ist sensibel — nicht an die Wand projizieren */
  body.beamer #plan .kachel.netto-plus, body.beamer #plan .kachel.netto-minus, body.beamer #plan .kachel.netto-fehlt { background: var(--karte); opacity: 1; }
  #plan.editor .kachel.leer { border: 1px dashed var(--kante); cursor: pointer; }
  #plan.editor .kachel .marken { display: none; }
  .aktionsbar {
    position: fixed; left: 0; right: 0; bottom: calc(env(safe-area-inset-bottom) + 52px);
    background: var(--karte); border-top: 1px solid var(--kante); padding: 8px 10px; z-index: 35;
    display: flex; gap: 6px; overflow-x: auto;
  }
  .aktionsbar .wer { font-weight: 700; padding: 8px 6px; white-space: nowrap; }
  .aktionsbar button {
    background: var(--karte2); border: 1px solid var(--kante); border-radius: 8px;
    min-width: 48px; min-height: 48px; font-size: 16px; cursor: pointer; white-space: nowrap; padding: 4px 10px;
  }
  .aktionsbar button:active { border-color: var(--band); }
  .aktionsbar button.plus { color: var(--gut); } .aktionsbar button.minus { color: var(--fehl); }
  /* ── Deck ── */
  #deck-karte {
    background: var(--karte); border: 1px solid var(--kante); border-radius: 16px;
    max-width: 420px; margin: 12px auto; padding: 26px 18px; text-align: center; min-height: 220px;
    display: flex; flex-direction: column; justify-content: center; gap: 8px;
    touch-action: none; position: relative;
  }
  #deck-karte .gross { font-size: 30px; font-weight: 700; }
  #deck-karte .sub { color: var(--leise); }
  #deck-fortschritt { text-align: center; color: var(--leise); font-variant-numeric: tabular-nums; }
  .deck-bar { height: 6px; background: var(--karte); border: 1px solid var(--kante); border-radius: 4px; overflow: hidden; max-width: 420px; margin: 6px auto 0; }
  .deck-bar > div { height: 100%; background: var(--gut); transition: width .2s; }
  .deck-hilfe { display: flex; justify-content: space-between; max-width: 420px; margin: 0 auto; color: var(--leise); font-size: 13px; padding: 0 8px; }
  .deck-btns { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  /* ── Schüler-Liste + Inline-Detail-Akkordeon ── */
  .s-block { border-top: 1px solid var(--kante); }
  .s-block:first-child { border-top: none; }
  .s-block.offen { background: var(--karte2); border-radius: 8px; margin: 4px -6px; }
  .s-item { display: flex; align-items: center; gap: 10px; padding: 10px 6px; cursor: pointer; min-height: 48px; }
  .s-item .pfeil { color: var(--leise); font-size: 15px; }
  .balken { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: var(--karte); }
  .balken div { height: 100%; }
  .s-detail { padding: 4px 10px 12px; }
  .s-detail .tag-gruppe { margin-top: 8px; }
  .s-detail .tag-kopf { color: var(--band); font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .s-detail .ev-zeile { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 4px 0; border-top: 1px solid var(--kante); font-size: 14px; }
  .balken { min-width: 60px; }
  /* ── Gruppen-Editor: Direktbuttons ── */
  .gr-zeile { display: flex; align-items: center; gap: 8px; padding: 6px 2px; border-top: 1px solid var(--kante); }
  .gr-zeile:first-child { border-top: none; }
  .gr-name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gr-btns { display: flex; gap: 4px; }
  .gr-b { background: var(--karte2); border: 1px solid var(--kante); border-radius: 7px; min-width: 38px; min-height: 40px; cursor: pointer; font-weight: 700; color: inherit; }
  .gr-b.an { background: var(--band); color: #1a1206; border-color: var(--band); }
  /* ── Lock ── */
  #lock {
    position: fixed; inset: 0; background: var(--grund); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 24px;
  }
  #lock h1 { font-size: 26px; margin: 0; }
  #lock input { text-align: center; letter-spacing: .3em; font-size: 22px; width: 220px; }
  #lock .fehler { color: var(--fehl); min-height: 1.4em; font-size: 14px; }
}
</style>

<script>
'use strict';
(function () {
const APP_VERSION = '0.6.0';
const GERAET = /iPad|iPhone/.test(navigator.userAgent) ? 'ipad' : 'pc';
const PAGES_KONTEXT = /\.github\.io$/.test(location.hostname);
// Zwei-Instanzen-Trennung: /dev/ = Claudes Entwicklungs-Kladde (eigene DB, Pseudo-Daten) ·
// Wurzel = Zeros Produktiv-Kladde (echte Namen — Claude betritt sie NICHT mehr).
const IST_DEV = location.pathname.includes('/dev/');
if (IST_DEV) {
  document.title = 'Kladde DEV';
  document.addEventListener('DOMContentLoaded', function () {
    const h = document.querySelector('header.app');
    if (h) h.insertAdjacentHTML('beforeend', '<span style="background:var(--fehl);color:#fff;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700">DEV</span>');
  });
}

/* ═══ LOGIK (geinlined aus logic/*.mjs · Node-getestet 31/31) ═══ */

// --- skalen ---
const DRITTELNOTEN_SCHWELLEN = [[0,1,'1+'],[1,1,'1'],[4,3,'1-'],[5,3,'2+'],[2,1,'2'],[7,3,'2-'],[8,3,'3+'],[3,1,'3'],[10,3,'3-'],[11,3,'4+'],[4,1,'4'],[13,3,'4-'],[14,3,'5+'],[5,1,'5'],[16,3,'5-'],[17,3,'6']];
const DRITTELNOTEN = (() => { const m = {}; for (let n = 1; n <= 5; n++) { m[n+'+']=[3*n-1,3]; m[String(n)]=[n,1]; m[n+'-']=[3*n+1,3]; } m['6']=[6,1]; return m; })();
const EPS = 1e-7;
function drittelnoteLabel(wert){ const x=wert-EPS; let label='1+'; for(const [z,n,lab] of DRITTELNOTEN_SCHWELLEN){ if(x>=z/n) label=lab; else break; } return label; }
function wertZuLabel(wert){ for(const [label,[z,n]] of Object.entries(DRITTELNOTEN)){ if(Math.abs(wert-z/n)<1e-6) return label; } return null; }
function rundeAufDrittel(wert){ const w=Math.round(wert*3)/3; return Math.min(6,Math.max(1,w)); }
function klemmePunkte(p){ return Math.min(15,Math.max(0,Math.round(p))); }
function noteAlsWert(eingabe, profil){
  if(profil==='sek2'){ const p=Math.round(Number(eingabe)); if(!(Number.isInteger(p)&&p>=0&&p<=15)) throw new Error('Punkte '+eingabe+' außerhalb 0–15'); return p; }
  if(typeof eingabe==='string'){ const label=eingabe.replace('−','-').trim(); if(!(label in DRITTELNOTEN)) throw new Error('unbekannte Drittelnote '+eingabe); const [z,n]=DRITTELNOTEN[label]; return z/n; }
  const w=Number(eingabe); if(!(w>=0.6&&w<=6.0)) throw new Error('Wert '+eingabe+' außerhalb 0,67–6,00'); return w;
}

// --- merge ---
function mergeEvents(eventsA, eventsB){
  const nachId=new Map();
  for(const e of [...eventsA,...eventsB]){ const v=nachId.get(e.id); if(!v||String(e.ts)>String(v.ts)) nachId.set(e.id,e); }
  return [...nachId.values()].sort((a,b)=> String(a.ts)<String(b.ts)?-1:String(a.ts)>String(b.ts)?1:a.id<b.id?-1:a.id>b.id?1:0);
}
function inhaltGleich(a,b){ const {rev:_a,ts:_b,geraet:_c,...ra}=a; const {rev:_d,ts:_e,geraet:_f,...rb}=b; return JSON.stringify(ra)===JSON.stringify(rb); }
function mergeStammdaten(a,b){
  if(!a) return {ergebnis:b,konflikt:null,verworfen:null};
  if(!b) return {ergebnis:a,konflikt:null,verworfen:null};
  if(a.rev!==b.rev){ const [s,v]=a.rev>b.rev?[a,b]:[b,a]; return {ergebnis:s,konflikt:null,verworfen:v}; }
  if(inhaltGleich(a,b)) return {ergebnis:a,konflikt:null,verworfen:null};
  const [s,v]=String(a.ts)>=String(b.ts)?[a,b]:[b,a];
  return {ergebnis:s,verworfen:v,konflikt:'Stammdaten-Konflikt bei rev '+a.rev+': '+v.geraet+' ('+v.ts+') unterlag '+s.geraet+' ('+s.ts+') — verworfener Stand liegt bei.'};
}
function mergeContainerDaten(a,b){
  const konflikte=[]; const st=mergeStammdaten(a.stamm,b.stamm); if(st.konflikt) konflikte.push(st.konflikt);
  return {daten:{schema:a.schema||b.schema||'kladde/v1',stamm:st.ergebnis,events:mergeEvents(a.events||[],b.events||[])},verworfen:st.verworfen,konflikte};
}

// --- verdichtung ---
const SOMI_TYPEN=new Set(['+','o','-']);
const TERMIN_TYPEN=new Set(['+','o','-','note','mat','ipad_fehlt','ipad_leer','lernzeit','fehlt_e','fehlt_u','versp','notiz','ha']);
function wirksameEvents(events){ const st=new Set(events.filter(e=>e.stornoVon).map(e=>e.stornoVon)); return events.filter(e=>!st.has(e.id)); }
function terminVon(e){ return e.datum||String(e.ts).slice(0,10); }
function scoreVon(somi){ let p=0,o=0,m=0; for(const e of somi){ if(e.typ==='+')p++; else if(e.typ==='o')o++; else m++; } return {nPlus:p,nNull:o,nMinus:m,score:(p-m)/Math.max(1,p+o+m)}; }
function verdichte(kursEvents, schuelerNr, opt){
  const profil=opt?.profil||'sek1', lb=Boolean(opt?.lb), von=opt?.von||'', bis=opt?.bis||'9999-12-31';
  const wirksam=wirksameEvents(kursEvents).filter(e=>{const t=terminVon(e); return t>=von&&t<=bis;});
  const kursTermine=new Set(wirksam.filter(e=>TERMIN_TYPEN.has(e.typ)).map(terminVon));
  const meine=wirksam.filter(e=>e.schuelerNr===schuelerNr);
  const somi=meine.filter(e=>SOMI_TYPEN.has(e.typ));
  const direkte=meine.filter(e=>e.typ==='note');
  const beteiligt=new Set(meine.filter(e=>SOMI_TYPEN.has(e.typ)||e.typ==='note').map(terminVon));
  const bilanz=scoreVon(somi);
  const aktivQuote=kursTermine.size?beteiligt.size/kursTermine.size:0;
  let pfeil='→';
  const termine=[...new Set(somi.map(terminVon))].sort();
  if(termine.length>=4){
    const mitte=Math.ceil(termine.length/2); const fruehe=new Set(termine.slice(0,mitte));
    const s1=scoreVon(somi.filter(e=>fruehe.has(terminVon(e)))).score;
    const s2=scoreVon(somi.filter(e=>!fruehe.has(terminVon(e)))).score;
    const d=s2-s1; pfeil=d>0.15?'↑':d<-0.15?'↓':'→';
  }
  let vorschlag=null;
  if(!lb&&(somi.length>0||direkte.length>0)){
    if(profil==='sek2'){
      let punkte=somi.length?9+6*bilanz.score:null;
      if(direkte.length){ const mittel=direkte.reduce((s,e)=>s+noteAlsWert(e.wert,'sek2'),0)/direkte.length; punkte=punkte===null?mittel:(punkte+mittel)/2; }
      const p=klemmePunkte(punkte); vorschlag={wert:p,label:p+' P'};
    } else {
      let note=somi.length?3-2*bilanz.score:null;
      if(direkte.length){ const mittel=direkte.reduce((s,e)=>s+noteAlsWert(e.wert,'sek1'),0)/direkte.length; note=note===null?mittel:(note+mittel)/2; }
      const w=rundeAufDrittel(note); vorschlag={wert:w,label:wertZuLabel(w)};
    }
  }
  return {...bilanz,beteiligtTermine:beteiligt.size,kursTermine:kursTermine.size,aktivQuote,pfeil,vorschlag,regelText:regelText(profil)};
}
function regelText(profil){
  const basis='score = (n⁺ − n⁻) / (n⁺ + n° + n⁻) · Verlauf = 2. Hälfte − 1. Hälfte · direkte Noten zählen 50:50';
  return profil==='sek2'?'Punkte-Vorschlag = 9 + 6·score (0–15) · '+basis:'Noten-Vorschlag = 3 − 2·score (Drittelnoten) · '+basis;
}

// --- container (KLD1) ---
const KLD_MAGIC=new Uint8Array([0x4b,0x4c,0x44,0x31]);
async function ableiteSchluessel(passwort,salt,iterationen){
  const material=await crypto.subtle.importKey('raw',new TextEncoder().encode(passwort),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',hash:'SHA-256',salt,iterations:iterationen},material,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encodeContainer(obj,passwort,iterationen=600000){
  const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await ableiteSchluessel(passwort,salt,iterationen);
  const ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj))));
  const out=new Uint8Array(38+ct.length);
  out.set(KLD_MAGIC,0); out[4]=1; out[5]=1;
  new DataView(out.buffer).setUint32(6,iterationen,true);
  out.set(salt,10); out.set(iv,26); out.set(ct,38);
  return out;
}
function leseHeader(bytes){
  if(bytes.length<54) throw new Error('Container zu kurz');
  for(let i=0;i<4;i++) if(bytes[i]!==KLD_MAGIC[i]) throw new Error('kein Kladde-Container');
  if(bytes[4]!==1) throw new Error('unbekannte Container-Version');
  if(bytes[5]!==1) throw new Error('unbekannte KDF-Kennung');
  return {iterationen:new DataView(bytes.buffer,bytes.byteOffset).getUint32(6,true),salt:bytes.slice(10,26),iv:bytes.slice(26,38),ciphertext:bytes.slice(38)};
}
async function decodeContainer(bytes,passwort){
  const kopf=leseHeader(bytes);
  const key=await ableiteSchluessel(passwort,kopf.salt,kopf.iterationen);
  let klartext;
  try { klartext=await crypto.subtle.decrypt({name:'AES-GCM',iv:kopf.iv},key,kopf.ciphertext); }
  catch { throw new Error('Falsche PIN oder Container beschädigt'); }
  return JSON.parse(new TextDecoder().decode(klartext));
}

/* ═══ STORAGE · Vault = KLD1-Container in IndexedDB ═══ */
const DB_NAME=IST_DEV?'kladde_dev':'kladde_v1'; // getrennte Vaults für Dev- und Produktiv-Instanz
let db=null, pinRam=null, vault=null; // vault = entschlüsselter Zustand im RAM
function mitDb(){ return new Promise((res,rej)=>{ if(db) return res(db);
  const req=indexedDB.open(DB_NAME,1);
  req.onupgradeneeded=()=>req.result.createObjectStore('meta');
  req.onsuccess=()=>{db=req.result;res(db);}; req.onerror=()=>rej(req.error); }); }
function idbGet(k){ return mitDb().then(d=>new Promise((res,rej)=>{ const r=d.transaction('meta').objectStore('meta').get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); })); }
function idbPut(k,v){ return mitDb().then(d=>new Promise((res,rej)=>{ const tx=d.transaction('meta','readwrite'); tx.objectStore('meta').put(v,k); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); })); }

let speicherKette=Promise.resolve(); // Write-through seriell (keine Races)
function speichern(){
  if(!vault||!pinRam) return speicherKette;
  const snapshot=JSON.stringify(vault);
  speicherKette=speicherKette
    .then(()=>encodeContainer(JSON.parse(snapshot),pinRam))
    .then(blob=>idbPut('vault',blob))
    .catch(err=>{ console.error('[kladde] speichern',err); toast('⚠ Speichern fehlgeschlagen: '+err.message); });
  return speicherKette;
}
function leererVault(){
  return {schema:'kladde/v1',
    stamm:{rev:1,ts:new Date().toISOString(),geraet:GERAET,kurse:[],schueler:{},sitzplaene:{},kursprofile:{},stundenplanSlots:[],einstellungen:{slot:'m1'}},
    events:[]};
}
function stammMutiert(){ vault.stamm.rev++; vault.stamm.ts=new Date().toISOString(); vault.stamm.geraet=GERAET; }

/* ═══ PIN / LOCK (Auto-Lock 15 min · visibilitychange-Flush) ═══ */
const $=id=>document.getElementById(id);
let lockTimer=null, zuletztAktiv=Date.now();
function toast(text,ms=2600){ const t=$('toast'); t.textContent=text; t.classList.remove('hidden'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.add('hidden'),ms); }

async function lockInit(){
  const blob=await idbGet('vault');
  const neu=!blob;
  $('lock-text').textContent=neu?'Neue PIN festlegen (mind. 6 Stellen)':'PIN eingeben';
  $('pin2').classList.toggle('hidden',!neu);
  $('lock-btn').textContent=neu?'Kladde anlegen':'Öffnen';
  $('pin').value=''; $('pin2').value=''; $('lock-fehler').textContent='';
  $('lock').classList.remove('hidden');
  setTimeout(()=>$('pin').focus(),50);
  $('lock-btn').onclick=async()=>{
    const pin=$('pin').value;
    if(neu){
      if(pin.length<6){ $('lock-fehler').textContent='Mindestens 6 Stellen.'; return; }
      if(pin!==$('pin2').value){ $('lock-fehler').textContent='PINs stimmen nicht überein.'; return; }
      pinRam=pin; vault=leererVault();
      await speichern(); entsperrt();
    } else {
      $('lock-btn').disabled=true; $('lock-fehler').textContent='prüfe… (PBKDF2)';
      const t0=performance.now();
      try {
        vault=await decodeContainer(await idbGet('vault'),pin);
        pinRam=pin;
        console.log('[kladde] Unlock in',Math.round(performance.now()-t0),'ms');
        entsperrt();
      } catch(e){ $('lock-fehler').textContent=e.message; }
      $('lock-btn').disabled=false;
    }
  };
  const enter=e=>{ if(e.key==='Enter') $('lock-btn').click(); };
  $('pin').onkeydown=enter; $('pin2').onkeydown=enter;
}
function sperren(){ vault=null; pinRam=null; aktiverSchueler=null; $('aktionsbar').classList.add('hidden'); lockInit(); }
function entsperrt(){
  $('lock').classList.add('hidden');
  zuletztAktiv=Date.now();
  clearInterval(lockTimer);
  lockTimer=setInterval(()=>{ if(Date.now()-zuletztAktiv>15*60*1000) sperren(); },30*1000);
  kursAutowahl(); renderAlles();
}
['pointerdown','keydown'].forEach(evName=>document.addEventListener(evName,()=>{zuletztAktiv=Date.now();},{capture:true,passive:true}));
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden'&&vault) speichern(); });
window.addEventListener('pagehide',()=>{ if(vault) speichern(); });

let aktiverKursId=null, terminDatum=heuteIso(), aktiverSchueler=null, undoStack=[];
function heuteIso(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function kurs(){ return vault?.stamm.kurse.find(k=>k.id===aktiverKursId)||null; }
function kursSchueler(k){ return (vault.stamm.schueler[k.id]||[]); }
function profilTypen(k){
  const p=vault.stamm.kursprofile[k.id]||{};
  const basis=['+','o','-','mat','ipad_fehlt','ipad_leer','lernzeit'];
  if(p.ha) basis.push('ha');
  return basis;
}
// Bewertungs-Modus: bildet die 3 Fälle (Sek I=Drittel · Sek II=Punkte · Sek II=Drittel)
// auf die getestete 2-Wege-Logik ab — Sek-II-Drittel rechnet wie Sek I (Drittelnoten 1–6).
function bewertProfil(k){ return (k&&k.profil==='sek2'&&(k.notenmodus||'punkte')!=='drittel')?'sek2':'sek1'; }
function addEvent(typ,schuelerNr,extra={}){
  const e={id:crypto.randomUUID(),typ,schuelerNr,kursId:aktiverKursId,datum:terminDatum,ts:new Date().toISOString(),geraet:GERAET,...extra};
  vault.events.push(e);
  undoStack.push(e); if(undoStack.length>50) undoStack.shift();
  speichern();
  zeigeUndo(e);
  return e;
}
function stornoVon(e){
  const s={id:crypto.randomUUID(),typ:'storno',schuelerNr:e.schuelerNr,kursId:e.kursId,datum:e.datum,ts:new Date().toISOString(),geraet:GERAET,stornoVon:e.id};
  vault.events.push(s); speichern();
}
const TYP_LABEL={'+':'＋','o':'o','-':'−',mat:'Material',ipad_fehlt:'iPad fehlt',ipad_leer:'iPad leer',lernzeit:'Lernzeit',ha:'HA',fehlt_e:'fehlt (e)',fehlt_u:'fehlt (u)',versp:'zu spät',notiz:'Notiz',note:'Note'};
function zeigeUndo(e){

function schuelerVonNr(nr){ const k=kurs(); return k?kursSchueler(k).find(s=>s.nr===nr):null; }

// Aggregierter Tages-Stand (für Sitzplan-Symbole + Detail). EIN Reduzierer, zwei Zugänge:
// standAmTermin(nr) für Einzel-Abfrage · tagesStandIndex(datum) für den ganzen Sitzplan in einem Durchlauf.
function leererStand(){ return {plus:0,neutral:0,minus:0,mat:0,ipad:0,lernzeit:0,notiz:0,note:null,fehlt:null,versp:0,count:0}; }
function reduziereStand(evs){
  const st=leererStand(); st.count=evs.length;
  for(const e of evs){
    if(e.typ==='+') st.plus++;
    else if(e.typ==='o') st.neutral++;
    else if(e.typ==='-') st.minus++;
    else if(e.typ==='mat'||e.typ==='ha') st.mat++;
    else if(e.typ==='ipad_fehlt'||e.typ==='ipad_leer') st.ipad++;
    else if(e.typ==='lernzeit') st.lernzeit++;
    else if(e.typ==='notiz') st.notiz++;
    else if(e.typ==='note') st.note=e.wert;
    else if(e.typ==='fehlt_e') st.fehlt='e';
    else if(e.typ==='fehlt_u') st.fehlt='u';
    else if(e.typ==='versp') st.versp+=e.minuten||0;
  }
  return st;
}
function standAmTermin(nr,datum){
  return reduziereStand(wirksameEvents(vault.events).filter(e=>e.kursId===aktiverKursId&&e.schuelerNr===nr&&e.datum===datum));
}
function tagesStandIndex(datum){
  const byNr=new Map();
  for(const e of wirksameEvents(vault.events)){
    if(e.kursId!==aktiverKursId||e.datum!==datum) continue;
    let a=byNr.get(e.schuelerNr); if(!a){ a=[]; byNr.set(e.schuelerNr,a); }
    a.push(e);
  }
  const idx=new Map();
  for(const [nr,evs] of byNr) idx.set(nr,reduziereStand(evs));
  return idx;
}
const WOCHENTAG_KURZ=['So','Mo','Di','Mi','Do','Fr','Sa'];

function kursAutowahl(){
  if(!vault) return;
  const jetzt=new Date();
  const wtag=((jetzt.getDay()+6)%7)+1; // Mo=1
  const hhmm=String(jetzt.getHours()).padStart(2,'0')+':'+String(jetzt.getMinutes()).padStart(2,'0');
  const slot=vault.stamm.stundenplanSlots.find(s=>s.wochentag===wtag&&s.von<=hhmm&&hhmm<=s.bis);
  if(slot){ aktiverKursId=slot.kursId; aktiveTeilgruppe=slot.teilgruppe||null; $('kurs-slot').textContent=' · '+slot.von+'–'+slot.bis+(slot.teilgruppe?' · Gr. '+slot.teilgruppe:''); }
  else if(!aktiverKursId&&vault.stamm.kurse.length) aktiverKursId=vault.stamm.kurse[0].id;
  aktualisiereKursChip();
}
let aktiveTeilgruppe=null;

function zufallsSchueler(){
  const k=kurs(); if(!k) return;
  const alle=sichtbareSchueler(k); if(!alle.length) return;
  // Fair: nur echte SoMi (+/o/−) oder direkte Note zählt als „dran"; Abwesende raus.
  const info=new Map(alle.map(s=>[s.nr,standAmTermin(s.nr,terminDatum)]));
  const anwesend=alle.filter(s=>!info.get(s.nr).fehlt);
  const dran=new Set(anwesend.filter(s=>{const st=info.get(s.nr);return st.plus+st.neutral+st.minus+(st.note!=null?1:0)>0;}).map(s=>s.nr));
  let pool=anwesend.filter(s=>!dran.has(s.nr));
  let hinweis='';
  if(!pool.length){ pool=anwesend.length?anwesend:alle; hinweis=' · alle dran'; }
  const s=pool[Math.floor(Math.random()*pool.length)];
  aktiverSchueler=s.nr;
  renderHeute(); renderAktionsbar();
  const kachel=$('plan').querySelector('.kachel[data-nr="'+s.nr+'"]');
  if(kachel) kachel.scrollIntoView({block:'center',behavior:'smooth'});
  toast('🎲 '+s.vorname+' '+s.name+hinweis);
}
function kachelHtml(s,st){
  let cls='kachel schueler';
  if(aktiverSchueler===s.nr) cls+=' gewaehlt';
  if(!beamerModus){
    if(st.fehlt) cls+=' netto-fehlt';
    else if(st.plus>st.minus) cls+=' netto-plus';
    else if(st.minus>st.plus) cls+=' netto-minus';
  }
  let marken='';
  if(st.plus&&!st.minus) marken+='<span class="mk p">＋'+(st.plus>1?st.plus:'')+'</span>';
  else if(st.minus&&!st.plus) marken+='<span class="mk m">−'+(st.minus>1?st.minus:'')+'</span>';
  else if(st.plus&&st.minus) marken+='<span class="mk p">'+st.plus+'</span><span class="mk m">'+st.minus+'</span>';
  else if(st.neutral) marken+='<span class="mk o">o</span>';
  if(st.note!=null) marken+='<span class="mk sym">📊</span>';
  if(st.mat) marken+='<span class="mk sym">📕</span>';
  if(st.ipad) marken+='<span class="mk sym">📱</span>';
  if(st.lernzeit) marken+='<span class="mk sym">📝</span>';
  if(st.notiz) marken+='<span class="mk sym">✎</span>';
  if(st.versp) marken+='<span class="mk sym">⏰</span>';
  if(st.fehlt) marken+='<span class="mk '+(st.fehlt==='u'?'u':'o')+'">'+st.fehlt+'</span>';
  return '<div class="'+cls+'" data-nr="'+s.nr+'">'+
    '<div class="kopf"><span class="vn">'+esc(s.vorname)+'</span>'+(s.lb?'<span class="lb-badge">LB</span>':'')+'</div>'+
    '<span class="nn">'+esc(s.name)+'</span>'+
    '<div class="marken">'+marken+'</div></div>';
}
function renderHeute(){
  const k=kurs(); const plan=$('plan');
  plan.classList.toggle('editor',editorAktiv);
  if(!k){ datumStreifen(0,0); $('heute-leer').classList.remove('hidden'); plan.innerHTML=''; return; }
  $('heute-leer').classList.add('hidden');
  const idx=tagesStandIndex(terminDatum);
  const sichtSchueler=sichtbareSchueler(k);
  const erfasst=sichtSchueler.filter(s=>{const st=idx.get(s.nr);return st&&(st.plus+st.neutral+st.minus)>0;}).length;
  datumStreifen(erfasst,sichtSchueler.length);
  const grid=(vault.stamm.sitzplaene[k.id]||{}).grid||{};
  plan.classList.toggle('hidden',Object.keys(grid).length===0&&!editorAktiv);
  const sichtbar=new Set(sichtSchueler.map(s=>s.nr));
  let html='';
  for(let r=0;r<12;r++) for(let c=0;c<12;c++){
    const nr=grid[r+','+c];
    const s=nr?kursSchueler(k).find(x=>x.nr===nr):null;
    if(s&&sichtbar.has(s.nr)) html+=kachelHtml(s,idx.get(s.nr)||leererStand());
    else html+='<div class="kachel leer"></div>';
  }
  plan.innerHTML=html;
  const ohnePlatz=sichtSchueler.filter(s=>!Object.values(grid).includes(s.nr));
  if(ohnePlatz.length){
    let liste=$('ohne-platz'); if(!liste){ liste=document.createElement('div'); liste.id='ohne-platz'; liste.className='panel'; $('plan-wrap').after(liste); }
    liste.innerHTML='<h2>Ohne Sitzplatz</h2>'+ohnePlatz.map(s=>'<button class="btn still" style="margin:3px" data-nr="'+s.nr+'">'+esc(s.vorname)+' '+esc(s.name)+(s.lb?' · LB':'')+'</button>').join('');
    liste.querySelectorAll('[data-nr]').forEach(b=>b.onclick=()=>waehleSchueler(Number(b.dataset.nr)));

}

/* ═══ DECK · Stundenende-Ritual (Swipe: ←− →+ ↑Notiz ↓weiter) ═══ */
let deckListe=[], deckIdx=0;
function renderDeck(){
  const k=kurs();
  if(!k){ $('deck-karte').innerHTML='<span class="sub">Kein Kurs gewählt.</span>'; $('deck-fortschritt').textContent=''; return; }
  if(!deckListe.length||deckListe._kurs!==k.id||deckListe._datum!==terminDatum){
    deckListe=[...sichtbareSchueler(k)]; deckListe._kurs=k.id; deckListe._datum=terminDatum; deckIdx=0;
  }
  zeigeDeckKarte();
}
function zeigeDeckKarte(){
  const karte=$('deck-karte');
  const total=deckListe.length;
  const erfasst=deckListe.filter(s=>{const st=standAmTermin(s.nr,terminDatum);return st.plus+st.neutral+st.minus>0;}).length;
  const balken='<div class="deck-bar"><div style="width:'+(total?100*erfasst/total:0)+'%"></div></div>';
  if(deckIdx>=total){
    karte.innerHTML='<span class="gross">✓</span><span class="sub">'+total+' Karten durch · '+erfasst+' erfasst.</span>';
    $('deck-fortschritt').innerHTML='fertig · <b>'+erfasst+'</b> / '+total+' erfasst'+balken;
    return;
  }
  const s=deckListe[deckIdx];
  $('deck-fortschritt').innerHTML='Karte '+(deckIdx+1)+' / '+total+' · <b>'+erfasst+'</b> erfasst'+balken;
  karte.innerHTML='<span class="gross">'+esc(s.vorname)+'</span><span class="sub">'+esc(s.name)+(s.lb?' · LB':'')+'</span>';
}
function deckAktion(aktion){
  if(busy||deckIdx>=deckListe.length) return;
  busy=true;
  const s=deckListe[deckIdx];
  if(aktion==='+'||aktion==='o'||aktion==='-') addEvent(aktion,s.nr);
  if(aktion==='notiz'){ busy=false; zeigeMehrAktionen(s); return; }
  deckIdx++;
  zeigeDeckKarte();
  setTimeout(()=>{busy=false;},180);
}
document.querySelectorAll('[data-deck]').forEach(b=>b.addEventListener('click',()=>deckAktion(b.dataset.deck==='skip'?'skip':b.dataset.deck)));
(function deckSwipe(){
  const karte=$('deck-karte');
  let start=null;
  karte.addEventListener('pointerdown',e=>{ start=[e.clientX,e.clientY]; try{karte.setPointerCapture(e.pointerId);}catch{} });
  const ende=e=>{
    if(!start) return;
    const dx=e.clientX-start[0], dy=e.clientY-start[1]; start=null;
    const ax=Math.abs(dx), ay=Math.abs(dy);
    if(Math.max(ax,ay)<40) return;
    if(ax>ay) deckAktion(dx>0?'+':'-');
    else deckAktion(dy>0?'skip':'notiz');
  };
  karte.addEventListener('pointerup',ende);
  document.addEventListener('pointercancel',()=>{start=null;},{capture:true}); // Härtungs-Regel 1
})();

/* ═══ KURSE · Import / Profil / Slots / Sitzplan-Editor ═══ */
/* Kurs direkt in der App anlegen: Excel-Spalten kopieren → einfügen (Tab/Semikolon-tolerant) */
function slugId(text){ return String(text).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'kurs'; }
function parseSchuelerListe(text){
  const schueler=[]; const warnungen=[]; const nrGesehen=new Set();
  let ohneNr=false;
  const zeilen=String(text).split(/\r?\n/).map(z=>z.trim()).filter(Boolean);
  for(const zeile of zeilen){
    let felder=zeile.split(/\t|;/).map(f=>f.trim()).filter(f=>f!=='');
    if(felder.length===1&&felder[0].includes(',')) felder=felder[0].split(',').map(f=>f.trim());
    if(!felder.length) continue;
    if(/^(nr\.?|name|nachname)$/i.test(felder[0])){ continue; }              // Kopfzeile
    let nr=null;
    if(/^\d{1,2}$/.test(felder[0])){ nr=parseInt(felder[0],10); felder=felder.slice(1); }
    const lb=felder.some(f=>/^lb$/i.test(f));
    const inhalt=felder.filter(f=>!/^lb$/i.test(f));
    if(!inhalt.length){ warnungen.push('Zeile ohne Namen übersprungen: „'+zeile.slice(0,30)+'"'); continue; }
    if(nr===null){ ohneNr=true; nr=schueler.length+1; }
    if(nr<1||nr>32){ warnungen.push('Nr '+nr+' außerhalb 1–32 — übersprungen (Mappen-Grenze)'); continue; }
    if(nrGesehen.has(nr)){ warnungen.push('Nr '+nr+' doppelt — zweite Zeile übersprungen'); continue; }
    nrGesehen.add(nr);
    schueler.push({nr,name:inhalt[0]||'',vorname:inhalt[1]||'',lb});
    if(inhalt.length===1) warnungen.push('Nr '+nr+': nur ein Namensfeld — als Nachname übernommen');
  }
  if(ohneNr&&schueler.length) warnungen.push('Keine Nr-Spalte erkannt — laufend nummeriert. Für den Excel-Export muss die Reihenfolge der Mappe entsprechen (Zeile 1 = Nr 1)!');
  schueler.sort((a,b)=>a.nr-b.nr);
  return {schueler,warnungen};
}
function kursAnlegenDialog(){
  dlgZeigen('<h3>Kurs anlegen</h3>'+
    '<div class="zeile"><span>Klasse/Kurs</span><span><input type="text" id="kn-name" placeholder="z. B. 7b" style="width:130px"></span></div>'+

    '<div class="zeile"><span>Stufe</span><span><select id="kn-profil"><option value="sek1">Sek I (Drittelnoten)</option><option value="sek2">Oberstufe (Punkte)</option></select></span></div>'+
    '<p style="font-size:13px;color:var(--leise);margin:10px 0 4px">Schülerliste — aus Excel kopieren (Nr · Name · Vorname · ggf. LB) und hier einfügen, oder tippen (eine Zeile pro Kind, „Name; Vorname"):</p>'+
    '<textarea id="kn-liste" rows="8" style="width:100%;background:var(--karte2);color:var(--text);border:1px solid var(--kante);border-radius:8px;padding:8px;font-size:16px" placeholder="1\tMustermann\tMax\n2\tBeispiel\tBerna\tLB"></textarea>'+
    '<div id="kn-vorschau" style="font-size:13px;color:var(--leise);min-height:2.6em;margin-top:6px">Noch keine Zeilen.</div>'+
    '<div class="btn-reihe"><button class="btn" id="kn-ok" disabled>Kurs anlegen</button><button class="btn still" data-schliessen>Abbrechen</button></div>',
    el=>{
      const liste=el.querySelector('#kn-liste'), vorschau=el.querySelector('#kn-vorschau'), ok=el.querySelector('#kn-ok');

            ' — '+esc(geparst.schueler.slice(0,3).map(s=>s.nr+' '+s.vorname+' '+s.name).join(' · '))+(geparst.schueler.length>3?' …':'')+
            (geparst.warnungen.length?'<br>⚠ '+esc(geparst.warnungen[0])+(geparst.warnungen.length>1?' (+'+(geparst.warnungen.length-1)+')':''):'')
          : 'Noch keine Zeilen erkannt.';
        ok.disabled=!geparst.schueler.length;
      });
      ok.onclick=()=>{
        const name=el.querySelector('#kn-name').value.trim()||'Kurs';
        const fach=el.querySelector('#kn-fach').value.trim()||'';

        const k={id:slugId(name+'-'+fach+'-'+jahr),name,fach,schuljahr:jahr,lehrkraft:'',profil,slot:'m1'};
        const idx=vault.stamm.kurse.findIndex(x=>x.id===k.id);
        if(idx>=0) vault.stamm.kurse[idx]=k; else vault.stamm.kurse.push(k);
        vault.stamm.schueler[k.id]=geparst.schueler;

function renderKurse(){
  const wrap=$('view-kurse');
  let html='<div class="panel"><h2>Neuer Kurs</h2>'+
    '<p style="font-size:13px;color:var(--leise)">Am schnellsten: in Excel die Klassenlisten-Spalten markieren (Nr · Name · Vorname · ggf. LB), kopieren, hier einfügen. Alternativ die kurs.json vom PC-Werkzeug laden.</p>'+
    '<div class="btn-reihe"><button class="btn" id="btn-kurs-neu">Kurs anlegen (Einfügen)</button>'+
    '<button class="btn still" id="btn-import-kurs">kurs.json laden</button></div>'+
    '<input type="file" id="file-kurs" accept=".json,application/json" class="hidden"></div>';
  for(const k of vault.stamm.kurse){
    const anz=kursSchueler(k).length;
    const p=vault.stamm.kursprofile[k.id]||{};
    html+='<div class="panel"><h2>'+esc(k.name)+' · '+esc(k.fach)+' <small style="text-transform:none">('+k.profil+' · '+anz+' Schüler)</small></h2>'+
      '<div class="zeile"><span>Kladde-m-Slot (Export)</span><span><select data-slot="'+k.id+'">'+['m1','m2','m3','m4','m5','m6'].map(m=>'<option'+((k.slot||'m1')===m?' selected':'')+'>'+m+'</option>').join('')+'</select></span></div>'+
      (k.profil==='sek2'?'<div class="zeile"><span>Sek II · Noten-Eingabe</span><span><select data-notenmodus="'+k.id+'"><option value="punkte"'+((k.notenmodus||'punkte')==='punkte'?' selected':'')+'>Punkte 0–15</option><option value="drittel"'+(k.notenmodus==='drittel'?' selected':'')+'>Drittelnoten</option></select></span></div>':'')+
      '<div class="zeile"><span>HA-Typ aktiv (SekI-Schule: aus)</span><span><input type="checkbox" data-ha="'+k.id+'"'+(p.ha?' checked':'')+' style="width:22px;height:22px"></span></div>'+
      '<div class="btn-reihe">'+
      '<button class="btn still" data-plan-edit="'+k.id+'">Sitzplan bearbeiten</button>'+
      '<button class="btn still" data-slots="'+k.id+'">Stundenplan-Slots</button>'+
      '<button class="btn still" data-gruppen="'+k.id+'">Halbgruppen</button>'+
      '<button class="btn gefahr" data-kurs-weg="'+k.id+'">Entfernen</button></div></div>';
  }
  wrap.innerHTML=html;
  $('btn-kurs-neu').onclick=kursAnlegenDialog;
  $('btn-import-kurs').onclick=()=>$('file-kurs').click();
  $('file-kurs').onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    try {
      const kursJson=JSON.parse(await f.text());
      if(kursJson.schema!=='kladde/v1'||!kursJson.kurs) throw new Error('kein kladde/v1-Kurs');
      const k=kursJson.kurs; k.slot=k.slot||'m1';
      const idx=vault.stamm.kurse.findIndex(x=>x.id===k.id);
      if(idx>=0) vault.stamm.kurse[idx]=k; else vault.stamm.kurse.push(k);
      vault.stamm.schueler[k.id]=kursJson.schueler;
      stammMutiert(); speichern();
      aktiverKursId=k.id; aktualisiereKursChip();
      toast('Importiert: '+k.name+' ('+kursJson.schueler.length+' Schüler'+(kursJson.warnungen?.length?' · '+kursJson.warnungen.length+' Warnung(en)':'')+')');
      renderKurse();
    } catch(err){ toast('⚠ Import: '+err.message,4000); }
    e.target.value='';
  };
  wrap.querySelectorAll('[data-slot]').forEach(sel=>sel.onchange=()=>{ const k=vault.stamm.kurse.find(x=>x.id===sel.dataset.slot); k.slot=sel.value; stammMutiert(); speichern(); toast('Export-Slot: '+sel.value); });
  wrap.querySelectorAll('[data-notenmodus]').forEach(sel=>sel.onchange=()=>{ const k=vault.stamm.kurse.find(x=>x.id===sel.dataset.notenmodus); k.notenmodus=sel.value; stammMutiert(); speichern(); toast('Sek II: '+(sel.value==='drittel'?'Drittelnoten':'Punkte 0–15')); });
  wrap.querySelectorAll('[data-ha]').forEach(cb=>cb.onchange=()=>{ vault.stamm.kursprofile[cb.dataset.ha]={...(vault.stamm.kursprofile[cb.dataset.ha]||{}),ha:cb.checked}; stammMutiert(); speichern(); });
  wrap.querySelectorAll('[data-kurs-weg]').forEach(b=>b.onclick=()=>{
    dlgZeigen('<h3>Kurs entfernen?</h3><p style="color:var(--leise)">Ereignisse bleiben im Log (Storno-Prinzip), aber der Kurs verschwindet aus allen Listen.</p><div class="btn-reihe"><button class="btn gefahr" data-ok>Entfernen</button><button class="btn still" data-schliessen>Abbrechen</button></div>',
      el=>{ el.querySelector('[data-ok]').onclick=()=>{ vault.stamm.kurse=vault.stamm.kurse.filter(x=>x.id!==b.dataset.kursWeg); stammMutiert(); speichern(); if(aktiverKursId===b.dataset.kursWeg) aktiverKursId=null; dlgZu(); renderKurse(); aktualisiereKursChip(); }; });
  });
  wrap.querySelectorAll('[data-plan-edit]').forEach(b=>b.onclick=()=>sitzplanEditor(b.dataset.planEdit));
  wrap.querySelectorAll('[data-slots]').forEach(b=>b.onclick=()=>slotsEditor(b.dataset.slots));
  wrap.querySelectorAll('[data-gruppen]').forEach(b=>b.onclick=()=>gruppenEditor(b.dataset.gruppen));
}
function sitzplanEditor(kursId){
  aktiverKursId=kursId; aktualisiereKursChip();
  aktView='heute';
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.toggle('aktiv',x.dataset.view==='heute'));
  ['heute','deck','schueler','kurse','mehr'].forEach(v=>$('view-'+v).classList.toggle('hidden',v!=='heute'));
  editorAktiv=true;
  renderHeute();
  const plan=$('plan');
  toast('Editor: leere Kachel antippen → Schüler wählen · Schüler antippen → entfernen',5200);
  const k=kurs();
  const handler=e=>{
    const kachel=e.target.closest('.kachel'); if(!kachel) return;
    e.stopPropagation();
    const idx=[...plan.children].indexOf(kachel);
    const r=Math.floor(idx/12), c=idx%12;
    const sp=vault.stamm.sitzplaene[k.id]=vault.stamm.sitzplaene[k.id]||{grid:{}};
    const key=r+','+c;
    if(sp.grid[key]){ delete sp.grid[key]; stammMutiert(); speichern(); renderHeute(); return; }
    const vergeben=new Set(Object.values(sp.grid));
    const frei=kursSchueler(k).filter(s=>!vergeben.has(s.nr));
    dlgZeigen('<h3>Platz '+(r+1)+'/'+(c+1)+'</h3><input type="text" id="s-such" placeholder="Name tippen…" list="s-liste"><datalist id="s-liste">'+
      frei.map(s=>'<option value="'+esc(s.vorname+' '+s.name+' ('+s.nr+')')+'">').join('')+'</datalist>'+
      '<div style="max-height:30vh;overflow:auto;margin-top:8px">'+frei.map(s=>'<button class="btn still" style="display:block;width:100%;margin:4px 0" data-setz="'+s.nr+'">'+esc(s.vorname)+' '+esc(s.name)+'</button>').join('')+'</div>'+
      '<div class="btn-reihe"><button class="btn still" data-schliessen>Abbrechen</button></div>',
      el=>{
        const setze=nr=>{ sp.grid[key]=nr; stammMutiert(); speichern(); dlgZu(); renderHeute(); };
        el.querySelectorAll('[data-setz]').forEach(x=>x.onclick=()=>setze(Number(x.dataset.setz)));
        el.querySelector('#s-such').oninput=ev2=>{
          const m=ev2.target.value.match(/\((\d+)\)/); if(m) setze(Number(m[1]));
        };
        setTimeout(()=>el.querySelector('#s-such').focus(),60);
      });
  };
  plan.addEventListener('pointerup',handler);
  const fertigBtn=document.createElement('button');
  fertigBtn.className='btn'; fertigBtn.textContent='Sitzplan fertig'; fertigBtn.style.cssText='position:fixed;left:12px;bottom:calc(env(safe-area-inset-bottom) + 84px);z-index:40';
  fertigBtn.onclick=()=>{ editorAktiv=false; plan.removeEventListener('pointerup',handler); fertigBtn.remove(); renderHeute(); };
  document.body.appendChild(fertigBtn);
}

  const meine=slots.filter(s=>s.kursId===kursId);

    '<div id="slot-liste">'+meine.map((s,i)=>'<div class="zeile"><span>'+wt[s.wochentag]+' '+s.von+'–'+s.bis+(s.teilgruppe?' · Gr. '+s.teilgruppe:'')+'</span><button class="btn still" data-weg="'+slots.indexOf(s)+'">✕</button></div>').join('')+'</div>'+
    '<div class="zeile"><span>Neu</span><span><select id="sl-tag"><option value="1">Mo</option><option value="2">Di</option><option value="3">Mi</option><option value="4">Do</option><option value="5">Fr</option></select></span></div>'+
    '<div class="zeile"><span>von / bis</span><span><input type="time" id="sl-von" value="08:00" style="width:108px"> <input type="time" id="sl-bis" value="09:07" style="width:108px"></span></div>'+
    '<div class="zeile"><span>Teilgruppe</span><span><select id="sl-tg"><option value="">alle</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></span></div>'+

      el.querySelector('[data-add]').onclick=()=>{
        slots.push({wochentag:Number(el.querySelector('#sl-tag').value),von:el.querySelector('#sl-von').value,bis:el.querySelector('#sl-bis').value,kursId,teilgruppe:el.querySelector('#sl-tg').value||undefined});
        stammMutiert(); speichern(); dlgZu(); slotsEditor(kursId);
      };

const GRUPPEN_LABELS=['A','B','C','D'];

/* ═══ MEHR · Sync (Export/Import) + Heimnetz + Diagnose ═══ */
function renderMehr(){
  const wrap=$('view-mehr');
  wrap.innerHTML=
    '<div class="panel"><h2>Sichern & Übertragen</h2>'+
    '<p style="font-size:13px;color:var(--leise)">Container ist AES-GCM-verschlüsselt (PIN nötig zum Öffnen). iPad: „In Dateien sichern" → SMB-Ordner des PCs.</p>'+
    '<div class="btn-reihe"><button class="btn" id="btn-export">Container exportieren</button>'+
    '<button class="btn still" id="btn-import">Container importieren/mergen</button></div>'+
    '<input type="file" id="file-cont" accept=".enc,application/octet-stream" class="hidden"></div>'+
    (PAGES_KONTEXT?'':'<div class="panel"><h2>Heimnetz-Sync (PC-Server)</h2><div class="btn-reihe">'+
      '<button class="btn" id="btn-push">Push</button><button class="btn" id="btn-pull">Pull + Merge</button>'+
      '<span id="sync-status" style="color:var(--leise);font-size:13px;align-self:center"></span></div></div>')+
    '<div class="panel"><h2>Werkstatt</h2>'+
    '<div class="zeile"><span>Version</span><span class="wert">v'+APP_VERSION+' · '+GERAET+(PAGES_KONTEXT?' · Pages':' · Heimnetz')+'</span></div>'+
    '<div class="zeile"><span>Modus</span><span class="wert" id="dg-mode">…</span></div>'+
    '<div class="zeile"><span>persist()</span><span class="wert" id="dg-persist">…</span></div>'+
    '<div class="zeile"><span>Speicher</span><span class="wert" id="dg-quota">…</span></div>'+
    '<div class="zeile"><span>Ereignisse im Log</span><span class="wert">'+vault.events.length+'</span></div>'+
    '<div class="zeile"><span>Letzte Sicherung</span><span class="wert" id="dg-save">Write-through aktiv</span></div>'+
    '<div class="zeile"><span>Regel</span><span class="wert" style="max-width:55%">'+esc(regelText(bewertProfil(kurs())))+'</span></div></div>';
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  $('dg-mode').textContent=standalone?'standalone (installiert)':'Browser-Tab';
  if(navigator.storage?.persisted) navigator.storage.persisted().then(p=>$('dg-persist').textContent=p?'gewährt':'nicht gewährt');
  if(navigator.storage?.estimate) navigator.storage.estimate().then(e=>{ const mb=n=>(n/1048576).toFixed(1)+' MB'; $('dg-quota').textContent=mb(e.usage||0)+' / '+mb(e.quota||0); });
  $('btn-export').onclick=exportiereContainer;
  $('btn-import').onclick=()=>$('file-cont').click();
  $('file-cont').onchange=importiereContainer;
  if(!PAGES_KONTEXT){
    $('btn-push').onclick=syncPush;
    $('btn-pull').onclick=syncPull;
    fetch('/api/kladde/status',{cache:'no-store'}).then(r=>r.json()).then(s=>{ $('sync-status').textContent='Server ok · Zert bis '+s.zert_bis; }).catch(()=>{ $('sync-status').textContent='Server nicht erreichbar'; });
  }
}
async function aktuellerContainerBlob(){
  await speichern();
  return idbGet('vault');
}
async function exportiereContainer(){
  let bytes, name;
  try {
    bytes=await aktuellerContainerBlob();
    name='kladde-'+GERAET+'-'+heuteIso()+'.enc';
  } catch(err){ toast('⚠ Export: '+err.message,4000); return; }
  // FEHLER:519-Kaskade: share primär (iOS), bei Nicht-Abbruch-Fehler → Download-Fallback
  const file=new File([bytes],name,{type:'application/octet-stream'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try {
      await navigator.share({files:[file],title:'Kladde-Container'});
      toast('Export übergeben (Share)');
      return;
    } catch(err){
      if(err.name==='AbortError') return;            // bewusst abgebrochen
      console.warn('[kladde] share→download-Fallback:',err.message);
    }
  }
  const url=URL.createObjectURL(new Blob([bytes],{type:'application/octet-stream'}));
  const a=document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Export gestartet: '+name);
}
async function importiereContainer(e){
  const f=e.target.files[0]; e.target.value=''; if(!f) return;
  try {
    const fremd=await decodeContainer(new Uint8Array(await f.arrayBuffer()),pinRam);
    const {daten,konflikte}=mergeContainerDaten(vault,fremd);
    vault=daten; stammOhneBump(); await speichern();
    toast('Gemergt: '+vault.events.length+' Ereignisse'+(konflikte.length?' · ⚠ '+konflikte[0]:''),konflikte.length?6000:2600);
    kursAutowahl(); renderAlles();
  } catch(err){ toast('⚠ Import: '+err.message+' (gleiche PIN auf beiden Geräten?)',5000); }
}
function stammOhneBump(){ /* Merge-Ergebnis behält die Sieger-rev — bewusst kein rev++ */ }
async function syncPush(){
  try {
    const bytes=await aktuellerContainerBlob();
    const r=await fetch('/api/kladde/push/'+GERAET,{method:'POST',body:bytes});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    toast('Push ok · Generation '+j.generationen);
  } catch(err){ toast('⚠ Push: '+err.message,4000); }
}
async function syncPull(){
  try {
    const von=GERAET==='pc'?'ipad':'pc';
    const r=await fetch('/api/kladde/pull/'+von,{cache:'no-store'});
    if(r.status===404){ toast('Noch kein Container von „'+von+'" auf dem Server'); return; }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const fremd=await decodeContainer(new Uint8Array(await r.arrayBuffer()),pinRam);
    const {daten,konflikte}=mergeContainerDaten(vault,fremd);
    vault=daten; await speichern();
    toast('Pull+Merge ok: '+vault.events.length+' Ereignisse'+(konflikte.length?' · ⚠ '+konflikte[0]:''),konflikte.length?6000:2600);
    kursAutowahl(); renderAlles();
  } catch(err){ toast('⚠ Pull: '+err.message+' (gleiche PIN?)',4500); }
}

lockInit();
